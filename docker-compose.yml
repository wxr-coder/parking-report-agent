services:
  parking-report-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      STORAGE_DIR: /app/storage
      DATABASE_PATH: /app/storage/jobs.sqlite3
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
    volumes:
      - ./storage:/app/storage
