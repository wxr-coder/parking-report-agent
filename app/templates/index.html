<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parking Report Agent</title>
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; max-width: 760px; color: #202124; }
      form { display: grid; gap: 16px; }
      label { display: grid; gap: 6px; font-weight: 600; }
      input, textarea, button { font: inherit; }
      textarea { min-height: 96px; }
      button { width: fit-content; padding: 8px 14px; cursor: pointer; }
      code { background: #f1f3f4; padding: 2px 5px; }
    </style>
  </head>
  <body>
    <h1>Parking Report Agent</h1>
    <form method="post" action="/jobs" enctype="multipart/form-data">
      <label>DOCX 模板 <input type="file" name="template_file" accept=".docx" required /></label>
      <label>CSV 数据 <input type="file" name="data_file" accept=".csv" required /></label>
      <label>处理指令 <textarea name="instructions"></textarea></label>
      <button type="submit">Submit</button>
    </form>
    <p>提交后调用 <code>GET /jobs/{job_id}</code> 查看状态，完成后调用 <code>GET /jobs/{job_id}/download</code> 下载。</p>
  </body>
</html>
